<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Strategy Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="upload-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="text-center mb-5">
                    <div class="logo-icon mb-3">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <rect width="48" height="48" rx="12" fill="#0d6efd"/>
                            <path d="M14 28l8-10 8 6 8-12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                            <circle cx="14" cy="28" r="2" fill="white"/>
                            <circle cx="22" cy="18" r="2" fill="white"/>
                            <circle cx="30" cy="24" r="2" fill="white"/>
                            <circle cx="38" cy="12" r="2" fill="white"/>
                        </svg>
                    </div>
                    <h1 class="display-5 fw-bold">Trading Strategy Doctor</h1>
                    <p class="lead text-secondary">Quantitative research dashboard for reviewing algorithmic trading strategies</p>
                </div>

                <div class="card upload-card">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3">Upload Trade History</h5>

                        <div id="upload-errors" class="alert alert-danger d-none" role="alert"></div>

                        <div class="drop-zone" id="dropZone">
                            <div class="drop-zone-content">
                                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" class="mb-2">
                                    <path d="M20 28V12M20 12l-6 6m6-6l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <rect x="4" y="4" width="32" height="32" rx="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
                                </svg>
                                <p class="mb-1 fw-medium">Drag & drop your CSV here</p>
                                <p class="text-secondary small mb-3">or click to browse</p>
                                <input type="file" id="fileInput" accept=".csv" class="d-none">
                                <button class="btn btn-outline-primary btn-sm" id="browseBtn">Browse Files</button>
                            </div>
                            <div class="drop-zone-preview d-none">
                                <div class="d-flex align-items-center gap-3">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                        <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                    </svg>
                                    <div>
                                        <p class="mb-0 fw-medium" id="fileName">file.csv</p>
                                        <small class="text-secondary" id="fileSize">0 KB</small>
                                    </div>
                                    <button class="btn btn-sm btn-outline-secondary ms-auto" id="removeFileBtn">Remove</button>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-3">
                            <button class="btn btn-primary btn-lg" id="uploadBtn" disabled>
                                <span id="uploadBtnText">Upload & Analyze</span>
                                <span id="uploadSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <button class="btn btn-link text-decoration-none" id="loadSampleBtn">
                                Or load sample data
                            </button>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <small class="text-secondary">
                        Expected columns: Symbol, Date, Pnl, NetPnl, StrategyName, Session, TimeFrame …
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const browseBtn = document.getElementById('browseBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadBtnText = document.getElementById('uploadBtnText');
        const uploadSpinner = document.getElementById('uploadSpinner');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const errorsDiv = document.getElementById('upload-errors');

        // Drop zone states
        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        });
        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
        });
        dropZone.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        browseBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        let pendingFile = null;

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.csv')) {
                showErrors(['Please upload a .csv file.']);
                return;
            }
            hideErrors();
            document.querySelector('.drop-zone-content').classList.add('d-none');
            const preview = document.querySelector('.drop-zone-preview');
            preview.classList.remove('d-none');
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
            uploadBtn.disabled = false;
            pendingFile = file;
        }

        document.getElementById('removeFileBtn').addEventListener('click', () => {
            fileInput.value = '';
            document.querySelector('.drop-zone-content').classList.remove('d-none');
            document.querySelector('.drop-zone-preview').classList.add('d-none');
            uploadBtn.disabled = true;
            pendingFile = null;
            hideErrors();
        });

        uploadBtn.addEventListener('click', async () => {
            const file = pendingFile;
            if (!file) return;

            uploadBtn.disabled = true;
            uploadBtnText.textContent = 'Uploading…';
            uploadSpinner.classList.remove('d-none');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const resp = await fetch('/upload', { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.ok) {
                    window.location.href = '/dashboard';
                } else {
                    showErrors(data.errors || ['Upload failed.']);
                    uploadBtn.disabled = false;
                    uploadBtnText.textContent = 'Upload & Analyze';
                    uploadSpinner.classList.add('d-none');
                }
            } catch (err) {
                showErrors(['Network error. Please try again.']);
                uploadBtn.disabled = false;
                uploadBtnText.textContent = 'Upload & Analyze';
                uploadSpinner.classList.add('d-none');
            }
        });

        loadSampleBtn.addEventListener('click', async () => {
            loadSampleBtn.disabled = true;
            loadSampleBtn.textContent = 'Loading…';
            try {
                const resp = await fetch('/api/reset', { method: 'POST' });
                const data = await resp.json();
                if (data.ok) {
                    window.location.href = '/dashboard';
                } else {
                    showErrors(['Failed to load sample data.']);
                    loadSampleBtn.disabled = false;
                    loadSampleBtn.textContent = 'Or load sample data';
                }
            } catch (err) {
                showErrors(['Network error.']);
                loadSampleBtn.disabled = false;
                loadSampleBtn.textContent = 'Or load sample data';
            }
        });

        function showErrors(errors) {
            errorsDiv.classList.remove('d-none');
            errorsDiv.innerHTML = errors.map(e => '<div>' + e + '</div>').join('');
        }
        function hideErrors() {
            errorsDiv.classList.add('d-none');
            errorsDiv.innerHTML = '';
        }
    </script>
</body>
</html>
